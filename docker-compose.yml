services:
  dependency-guard-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - dependency-guard-data:/data
    environment:
      - PORT=8000
      - DB_PATH=/data/dependency-guard.db
      - NVD_API_KEY=${NVD_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dependency-guard-data:
